<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>MPLS Thank You </title>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #f5e6d3, #f8efe5, #f3dccf);
  text-align: center;
  overflow-x: hidden;
}

.page {
  display: none;
  padding: 80px 20px;
}

.active {
  display: block;
}

h1 {
  font-size: 2.5em;
}

p {
  max-width: 600px;
  margin: auto;
  line-height: 1.6;
}

.btn {
  display: inline-block;
  margin: 20px;
  padding: 15px 25px;
  background: #d6a77a;
  color: white;
  border-radius: 25px;
  text-decoration: none;
  font-size: 18px;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.1);
  background: #c48f5a;
}

.big {
  font-size: 28px;
}

/* typing */
.typing {
  border-right: 3px solid;
  width: 0;
  overflow: hidden;
  white-space: nowrap;
  animation: typing 3s steps(30, end) forwards, blink .8s infinite;
}

@keyframes typing {
  to { width: 100%; }
}

@keyframes blink {
  50% { border-color: transparent; }
}

/* gallery */
.photos {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 10px;
}

.photos img {
  width: 200px;
  height: 200px;
  object-fit: cover;
  border-radius: 15px;
  transition: 0.3s;
}

.photos img:hover {
  transform: scale(1.1);
}

.qr {
  width: 200px;
  margin-top: 20px;
}

/* confetti */
.confetti {
  position: fixed;
  width: 10px;
  height: 10px;
  background: red;
  top: 0;
  animation: fall linear infinite;
}

@keyframes fall {
  to {
    transform: translateY(100vh);
  }
}
</style>
</head>

<body>

<!-- PAGE 1 -->
<div class="page active" id="page1">
  <h1 class="typing">HALLOOO GUYSS 🎉</h1>
  <h2>BUKAA YAA!! 😆</h2>
  <button class="btn" onclick="nextPage(2)">→</button>
</div>

<!-- PAGE 2 -->
<div class="page" id="page2">
  <h1>Pilih duluu 👀</h1>
  <button class="btn big" onclick="choose('28')">'28</button>
  <button class="btn big" onclick="choose('27')">'27</button>
</div>

<!-- PAGE 3 (dynamic) -->
<div class="page" id="page3">
  <h1 id="title"></h1>
  <p id="message"></p>
  <button class="btn" onclick="nextPage(4)">→</button>
</div>

<!-- PAGE 4 -->
<div class="page" id="page4">
  <h1>📸 Momen Kita</h1>

  <div class="photos">
    <!-- GANTI FOTO DI SINI -->
    <img src="https://via.placeholder.com/200">
    <img src="https://via.placeholder.com/200">
    <img src="https://via.placeholder.com/200">
  </div>

  <h2>🎶 Lagu Kenangan</h2>
  <p>Scan yaa!</p>

  <!-- GANTI QR DI SINI -->
  <img src="https://via.placeholder.com/200" class="qr">
</div>

<script>
function nextPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page' + page).classList.add('active');
  confetti();
}

function choose(type) {
  let title = document.getElementById("title");
  let message = document.getElementById("message");

  if (type === '28') {
    title.innerHTML = "💖 Untuk Kalian '28";
    message.innerHTML = `
    Terima kasih banyak sudah menjalankan MPLS ini dengan penuh tanggung jawab 🤍<br><br>
    Kalian selalu tepat waktu saat jarkom, rapat, dan briefing setiap harinya ✨<br><br>
    Tetap semangat ya! 🔥<br>
    Jadikan ini sebagai gambaran MPLS berikutnya yang lebih keren!
    `;
  } else {
    title.innerHTML = "😆 Untuk Kalian '27";
    message.innerHTML = `
    Gila sih kalian 🤣<br><br>
    Terima kasih banyak udah ngeramein MPLS ini!<br><br>
    Dari yang serius sampai yang chaos 😜<br><br>
    Tapi tetap respect buat kalian 🔥
    `;
  }

  nextPage(3);
}

// CONFETTI
function confetti() {
  for (let i = 0; i < 50; i++) {
    let conf = document.createElement("div");
    conf.classList.add("confetti");
    conf.style.left = Math.random() * 100 + "vw";
    conf.style.background = ["#d6a77a","#f5e6d3","#c48f5a","#fff"][Math.floor(Math.random()*4)];
    conf.style.animationDuration = (Math.random() * 3 + 2) + "s";
    document.body.appendChild(conf);

    setTimeout(() => conf.remove(), 4000);
  }
}
</script>

</body>
</html>
