<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>MPLS Thank You 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Quicksand', sans-serif;
  background: linear-gradient(135deg, #fbeaea, #f6d6d6, #f3e1d5, #fff4ec);
}

.page {
  display: none;
  padding: 80px 20px;
  text-align: center;
  animation: fade 0.8s ease;
}

.active { display: block; }

@keyframes fade {
  from {opacity:0; transform:scale(0.95);}
  to {opacity:1; transform:scale(1);}
}

h1 {
  font-family: 'Playfair Display', serif;
}

p {
  max-width: 700px;
  margin: auto;
  line-height: 1.7;
}

#message p {
  margin-bottom: 15px;
  text-align: justify;
}

.btn {
  margin: 15px;
  padding: 15px 25px;
  background: linear-gradient(135deg, #e8a9a9, #d6a77a);
  color: white;
  border-radius: 30px;
  font-size: 18px;
  border: none;
  cursor: pointer;
}

.btn:hover {
  transform: scale(1.1);
}

.photos {
  display: flex;
  justify-content: center;
  gap: 15px;
  flex-wrap: wrap;
}

.photos img {
  width: 220px;
  height: 220px;
  object-fit: cover;
  border-radius: 20px;
}

.qr {
  width: 200px;
  margin-top: 20px;
}

.confetti {
  position: fixed;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  top: 0;
  animation: fall linear infinite;
}

@keyframes fall {
  to { transform: translateY(100vh); }
}
</style>
</head>

<body>

<div class="page active" id="page1">
  <h1>HALLOOO GUYSS 🎉</h1>
  <h2>BUKAA YAA!! 😆</h2>
  <button class="btn" onclick="nextPage(2)">→</button>
</div>

<div class="page" id="page2">
  <h1>Pilih duluu 👀</h1>
  <button class="btn" onclick="choose('28')">'28</button>
  <button class="btn" onclick="choose('27')">'27</button>
</div>

<div class="page" id="page3">
  <h1 id="title"></h1>
  <div id="message"></div>
  <button class="btn" onclick="nextPage(4)">→</button>
</div>

<div class="page" id="page4">
  <h1>📸 Momen Kita</h1>

  <div class="photos">
    <img src="IMG-20260714-WA0151.jpg">
    <img src="IMG-20260715-WA0056.jpg">
    <img src="motion_photo_4051050408843357562.jpg">
  </div>

  <h2>🎶 Lagu Kenangan</h2>
  <p>Scan di bawah yaa 💖</p>

  <img src="barcode (1).png" class="qr">

  <br>
  <button class="btn" onclick="nextPage(5)">Next →</button>
</div>

<div class="page" id="page5">
  <h1>🍽️ Pilih Makanan Favorit!</h1>

  <button class="btn" onclick="foodChoice()">🍝 Spaghetti Aglio Olio</button>
  <button class="btn" onclick="foodChoice()">🍚 Nasi Goreng</button>
  <button class="btn" onclick="foodChoice()">🍛 Curry Jepang</button>
</div>

<div class="page" id="page6">
  <h1>THANKK YOUU YAA 💖🎉</h1>
  <h2>DI TUNGGU !! 😆🔥</h2>
</div>

<script>
function nextPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page' + page).classList.add('active');
  confetti();
}

function choose(type) {
  let title = document.getElementById("title");
  let message = document.getElementById("message");

  if (type === '28') {
    title.innerHTML = "💖 Untuk '28";

    message.innerHTML = `
    <p>adik adik, akang teteh sangat berterimakasih untuk kerja keras yang telah kalian maksimalkan di proker MPLS tahun ini 🙏✨</p>

    <p>tolong jadikan pembelajaran untuk beberapa kesalahan yang terjadi di proker MPLS agar dikedepannya tidak terjadi kesalahan yang sama 💡</p>

    <p>anggap saja proker kali ini sebagai jalan awal menuju banyak hal lain dikedepannya untuk lebih baik 🚀</p>

    <p>tingkatkan lagi inisiatif nya dan maksimalkan selalu kerja keras kalian 💪🔥</p>

    <p>mohon maaf apabila akang teteh kurang baik dalam membina kalian 🙏🤍</p>
    `;

  } else {
    title.innerHTML = "😆 Untuk '27";

    message.innerHTML = `
    <p>Halo man temann 👋😆,</p>

    <p>Sebelumnya kita mau ngucapin makasih yang banyak banget buat semua panit yang udah bantu dari awal sampai akhir kegiatan mpls di hari ini 🙏🔥</p>

    <p>Kita bener bener ngapresiasi kehadiran dan kinerja kalian di lapangan, pun yang di belakang layar 💖✨</p>

    <p>Sekiranya ada salah kata atau ada sikap kita yang ga enak ke kalian selama kegiatan ini, mohon dimaafkan yaa man temannn.. 🙏🤍</p>

    <p><b>POKOKNYA KALIAN SEMUA KEREN BANGET EUYYYY! 🎉🔥😆</b></p>
    `;
  }

  nextPage(3);
}

function foodChoice() {
  nextPage(6); // AUTO KE HALAMAN TERAKHIR
}

function confetti() {
  let colors = ["#ff6b6b","#ffd93d","#6bcBef","#f3a683","#ff9ff3"];

  for (let i = 0; i < 60; i++) {
    let c = document.createElement("div");
    c.classList.add("confetti");
    c.style.left = Math.random()*100 + "vw";
    c.style.background = colors[Math.floor(Math.random()*colors.length)];
    c.style.animationDuration = (Math.random()*3+2)+"s";
    document.body.appendChild(c);

    setTimeout(() => c.remove(), 4000);
  }
}
</script>

</body>
</html>
