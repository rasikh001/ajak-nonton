<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>MPLS Thank You 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Quicksand', sans-serif;
  background: linear-gradient(135deg, #fbeaea, #f6d6d6, #f3e1d5, #fff4ec);
  overflow-x: hidden;
}

.page {
  display: none;
  padding: 80px 20px;
  text-align: center;
  position: relative;
  animation: fade 0.8s ease;
}

.active { display: block; }

@keyframes fade {
  from {opacity:0; transform:scale(0.95);}
  to {opacity:1; transform:scale(1);}
}

h1 {
  font-family: 'Playfair Display', serif;
  font-size: 2.8em;
}

p {
  max-width: 700px;
  margin: auto;
  line-height: 1.7;
}

.btn {
  display: inline-block;
  margin: 15px;
  padding: 15px 25px;
  background: linear-gradient(135deg, #e8a9a9, #d6a77a);
  color: white;
  border-radius: 30px;
  font-size: 18px;
  border: none;
  cursor: pointer;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.1) rotate(-2deg);
}

.photos {
  display: flex;
  justify-content: center;
  gap: 15px;
  flex-wrap: wrap;
}

.photos img {
  width: 220px;
  height: 220px;
  object-fit: cover;
  border-radius: 20px;
  transition: 0.3s;
}

.photos img:hover { transform: scale(1.1); }

.qr {
  width: 200px;
  margin-top: 30px;
}

.confetti {
  position: fixed;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  top: 0;
  animation: fall linear infinite;
}

@keyframes fall {
  to { transform: translateY(100vh); }
}

.shape {
  position: absolute;
  opacity: 0.2;
}

.circle {
  width: 80px;
  height: 80px;
  background: #e8a9a9;
  border-radius: 50%;
}

.triangle {
  width: 0;
  height: 0;
  border-left: 40px solid transparent;
  border-right: 40px solid transparent;
  border-bottom: 70px solid #d6a77a;
}

.blob {
  width: 120px;
  height: 80px;
  background: #f3cfcf;
  border-radius: 50% 40% 60% 40%;
}

.s1 { top: 20px; left: 10px; }
.s2 { top: 200px; right: 20px; }
.s3 { bottom: 50px; left: 30px; }
.s4 { bottom: 100px; right: 40px; }
</style>
</head>

<body>

<!-- PAGE 1 -->
<div class="page active" id="page1">
  <h1>HALLOOO GUYSS 🎉</h1>
  <h2>BUKAA YAA!! 😆</h2>
  <button class="btn" onclick="nextPage(2)">→</button>
</div>

<!-- PAGE 2 -->
<div class="page" id="page2">
  <h1>Pilih duluu 👀</h1>
  <button class="btn" onclick="choose('28')">'28</button>
  <button class="btn" onclick="choose('27')">'27</button>
</div>

<!-- PAGE 3 -->
<div class="page" id="page3">
  <h1 id="title"></h1>
  <p id="message"></p>
  <button class="btn" onclick="nextPage(4)">→</button>
</div>

<!-- PAGE 4 FOTO -->
<div class="page" id="page4">
  <h1>📸 </h1>

  <div class="photos">
    <img src="IMG-20260714-WA0151.jpg">
    <img src="IMG-20260715-WA0056.jpg">
    <img src="motion_photo_4051050408843357562.jpg">
  </div>

  <h2>🎶 Lagu Kenangan</h2>
  <p>Scan di bawah yaa 💖</p>

  <img src="barcode (1).png" class="qr">

  <br>
  <button class="btn" onclick="nextPage(5)">Next →</button>
</div>

<!-- PAGE 5 MAKANAN -->
<div class="page" id="page5">
  <h1>🍽️ Pilih Makanan Favorit!</h1>

  <button class="btn" onclick="foodChoice()">🍝 Spaghetti Aglio Olio</button>
  <button class="btn" onclick="foodChoice()">🍚 Nasi Goreng</button>
  <button class="btn" onclick="foodChoice()">🍛 Curry Jepang</button>
</div>

<!-- PAGE 6 FINAL -->
<div class="page" id="page6">
  <h1>THANKK YOUU GUYYSS 💖🎉</h1>
  <h2>DI TUNGGUU !! 😆🔥</h2>
</div>

<script>
function nextPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page' + page).classList.add('active');
  confetti();
}

function choose(type) {
  let title = document.getElementById("title");
  let message = document.getElementById("message");

  if (type === '28') {
    title.innerHTML = "💖 Untuk '28";
    message.innerHTML = "adik adik, akang teteh sangat berterimakasih untuk kerja keras yang telah kalian maksimalkan di proker MPLS tahun ini 🙏✨. tolong jadikan pembelajaran untuk beberapa kesalahan yang terjadi di proker MPLS agar dikedepannya tidak terjadi kesalahan yang sama 💡. anggap saja proker kali ini sebagai jalan awal menuju banyak hal lain dikedepannya untuk lebih baik 🚀, tingkatkan lagi inisiatif nya dan maksimalkan selalu kerja keras kalian 💪🔥, mohon maaf apabila akang teteh kurang baik dalam membina kalian 🙏🤍";
  } else {
    title.innerHTML = "😆 Untuk '27";
    message.innerHTML = "Halo man temann 👋😆,<br><br>Sebelumnya kita mau ngucapin makasih yang banyak banget buat semua panit yang udah bantu dari awal sampai akhir kegiatan mpls di hari ini 🙏🔥. Kita bener bener ngapresiasi kehadiran dan kinerja kalian di lapangan, pun yang di belakang layar 💖✨.<br><br>Sekiranya ada salah kata atau ada sikap kita yang ga enak ke kalian selama kegiatan ini, mohon dimaafkan yaa man temannn.. 🙏🤍<br><br>POKOKNYA KALIAN SEMUA KEREN BANGET EUYYYY! 🎉🔥😆";
  }

  nextPage(3);
}

function foodChoice() {
  nextPage(6);
}

/* CONFETTI */
function confetti() {
  let colors = ["#ff6b6b","#ffd93d","#6bcBef","#f3a683","#ff9ff3"];

  for (let i = 0; i < 60; i++) {
    let c = document.createElement("div");
    c.classList.add("confetti");
    c.style.left = Math.random()*100 + "vw";
    c.style.background = colors[Math.floor(Math.random()*colors.length)];
    c.style.animationDuration = (Math.random()*3+2)+"s";
    document.body.appendChild(c);

    setTimeout(() => c.remove(), 4000);
  }
}
</script>

</body>
</html>
