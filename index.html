<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You 💖</title>

<!-- FONT LUCU -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&family=Fredoka:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  text-align: center;
  background: linear-gradient(135deg, #ffd1dc, #ffe4e1, #e0bbff);
  background-size: 300% 300%;
  animation: gradientMove 10s ease infinite;
  color: #444;
  overflow: hidden;
}

@keyframes gradientMove {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

.container {
  margin-top: 100px;
  padding: 20px;
  position: relative;
}

h1 {
  font-family: 'Fredoka', sans-serif;
  font-size: 2.7em;
}

p {
  font-size: 1.2em;
}

button {
  padding: 12px 25px;
  margin: 10px;
  font-size: 1em;
  border: none;
  border-radius: 25px;
  cursor: pointer;
  background: linear-gradient(to right, #ff8fab, #ffb3c6);
  color: white;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.1);
}

.input-date {
  padding: 10px;
  font-size: 1em;
  border-radius: 10px;
  border: none;
}

/* STIKER */
.sticker {
  position: absolute;
  width: 100px;
  animation: float 4s ease-in-out infinite;
}

@keyframes float {
  0%,100% {transform: translateY(0);}
  50% {transform: translateY(-15px);}
}

.buzz { top: 20px; left: 20px; }
.woody { bottom: 20px; right: 20px; }
.alien { top: 20px; right: 20px; }
</style>

</head>

<body>

<!-- MUSIK -->
<audio autoplay loop>
  <source src="https://www.bensound.com/bensound-music/bensound-sunny.mp3" type="audio/mpeg">
</audio>

<!-- STIKER TOY STORY -->
<img src="https://i.imgur.com/3ZQ3Z6F.png" class="sticker buzz">
<img src="https://i.imgur.com/Jy7G6YF.png" class="sticker woody">
<img src="https://i.imgur.com/Y6X8X3B.png" class="sticker alien">

<div class="container" id="content">

<h1>HALLOWW 👋</h1>
<p>So, how’s everything been lately?<br>Has it been fun?</p>
<button onclick="next1()">→</button>

</div>

<script>

function next1() {
  document.getElementById("content").innerHTML = `
    <h1>aku lagi kepikiran sesuatu…</h1>
    <p>gimana kalau kita nonton 🎬 <b>Toy Story</b> bareng?</p>
    <p>i think it’s gonna be fun 😄</p>
    <button onclick="yes()">yesss, I’m in!</button>
    <button onclick="no()">hmmm, maybe not for now</button>
  `;
}

function yes() {
  document.getElementById("content").innerHTML = `
    <h1>YESSS! 🎉</h1>
    <p>okiii kita fix yapp!</p>
    <p>nanti aku yang atur semuanya 😎</p>
    <button onclick="datePage()">→</button>
  `;
}

function datePage() {
  document.getElementById("content").innerHTML = `
    <h1>Pilih tanggal yuk 📅</h1>
    <p>kamu maunya kapan?</p>
    <input type="date" class="input-date" id="dateInput"><br><br>
    <button onclick="finalYes()">→</button>
  `;
}

function finalYes() {
  let date = document.getElementById("dateInput").value;
  document.getElementById("content").innerHTML = `
    <h1>Noted! 😆</h1>
    <p>kita nonton tanggal: <b>${date}</b></p>
    <p>thanks a lot for your time, and for filling this out! 💖</p>
  `;
}

function no() {
  document.getElementById("content").innerHTML = `
    <h1>It's okay 😊</h1>
    <p>No worries at all, just chill!</p>
    <p>Thanks for your answer! 💖</p>
  `;
}

</script>

</body>
</html>
</body>
</html>
